<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAMAKU - Ventas Luxury Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --blanco: #ffffff;
            --negro: #0a0a0a;
            --dorado-brillo: #fdfc97;
            --dorado-medio: #d4af37;
            --dorado-oscuro: #a67c00;
            --dorado-shadow: rgba(166, 124, 0, 0.4);
            --gris-fondo: #f5f5f7;
            --azul: #007aff;
            --verde: #28cd41;
            --rojo: #ff3b30;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(212, 175, 55, 0.2);
            --font-main: 'Poppins', sans-serif;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f5f5f7 0%, #e2e2e7 100%);
            height: 100vh;
            display: flex;
            overflow: hidden;
            color: var(--negro);
        }

        .app { display: flex; width: 100%; height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
        }

        .logo-container { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        .logo { 
            font-size: 26px; font-weight: 800; 
            background: linear-gradient(to bottom, var(--dorado-brillo), var(--dorado-oscuro));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .sub-logo { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

        .menu { flex: 1; }
        .menu button {
            width: 100%; padding: 14px 18px; margin-bottom: 10px;
            border: 1px solid transparent; border-radius: 16px;
            background: transparent; cursor: pointer; transition: all 0.3s;
            text-align: left; font-weight: 600; color: #444;
            display: flex; align-items: center; gap: 12px;
        }
        .menu button.activo {
            color: var(--negro);
            background: linear-gradient(135deg, var(--dorado-brillo), var(--dorado-medio), var(--dorado-oscuro));
            box-shadow: 0 10px 20px var(--dorado-shadow);
            border: 1px solid var(--dorado-oscuro);
        }

        /* --- CONTENIDO --- */
        .main-container { flex: 1; display: flex; overflow: hidden; position: relative; }
        .work-area { flex: 1; padding: 30px; overflow-y: auto; }

        .card {
            background: var(--blanco);
            padding: 25px;
            border-radius: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .modo-selector { display: flex; gap: 12px; }
        .btn-modo {
            flex: 1; padding: 16px; border: none; border-radius: 18px;
            font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .btn-modo.off { background: #f0f0f3; color: #999; }
        .btn-modo.rapido-on { background: var(--azul); color: white; }
        .btn-modo.cuenta-on { 
            background: linear-gradient(135deg, var(--dorado-brillo), var(--dorado-oscuro));
            color: var(--negro);
        }

        input {
            width: 100%; padding: 14px; border-radius: 15px;
            border: 1px solid #eee; background: #f9f9fb; outline: none;
        }

        .search-grid { display: grid; grid-template-columns: 80px 1fr 80px 110px; gap: 10px; align-items: flex-end; }
        .btn-agregar { background: var(--negro); color: var(--dorado-brillo); padding: 14px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; }

        .result-box { 
            margin-top: 5px; 
            max-height: 250px; 
            overflow-y: auto; 
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: absolute; /* Para que flote sobre el contenido */
            width: 90%;
            z-index: 50;
        }
        .item-row { 
            padding: 12px 18px; 
            border-bottom: 1px solid #f8f8f8; 
            display: flex; 
            justify-content: space-between; 
            cursor: pointer; 
            background: #fff;
            transition: background 0.2s;
        }
        .item-row:hover { background: #fff9e6; }
        .item-row b { color: var(--dorado-oscuro); }

        /* --- PANEL DERECHO --- */
        .right-panel {
            width: 380px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--negro);
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--glass-border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
        }
        .cart-header h2 { color: var(--dorado-medio); font-size: 24px; font-weight: 800; }
        .cart-list { flex: 1; overflow-y: auto; margin: 15px 0; }
        .cart-item { background: #f9f9fb; color: var(--negro); padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--dorado-medio); border-bottom: 1px solid #eee; }
        .total-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-top: 1px solid #333; }
        .total-row span:last-child { font-size: 32px; font-weight: 800; color: var(--dorado-brillo); }

        .btn-acc { padding: 18px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; }
        .btn-green { background: var(--verde); color: #fff; width: 100%; margin-bottom: 10px; }

        /* --- TOASTS --- */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--negro); color: white; padding: 15px 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-left: 5px solid var(--dorado-medio); animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* --- MODALES --- */
        .modal-overlay { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 35px; width: 95%; max-width: 450px; text-align: center; margin-bottom: 50px; }
        
        /* BOTONES DE PAGO MEJORADOS */
        .pay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 25px 0; }
        .pay-btn { 
            padding: 20px 5px; border: 2px solid #f0f0f0; border-radius: 20px; 
            background: #fff; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .pay-btn span { font-size: 24px; }
        .pay-btn b { font-size: 11px; text-transform: uppercase; color: #666; }
        .pay-btn.selected { border-color: var(--verde); background: #f0fff4; transform: scale(1.05); box-shadow: 0 5px 15px rgba(40,205,65,0.2); }
        .pay-btn.selected b { color: var(--verde); }

        /* TABBAR */
        .tabbar {
            display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 85px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border); justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom); z-index: 8000;
        }
        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; color: #999; font-size: 10px; font-weight: 700;
        }
        .tab-item.activo { color: var(--dorado-oscuro); }
        .tab-item .icon { font-size: 22px; margin-bottom: 2px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .tabbar { display: flex; }
            .app { height: auto; overflow: auto; }
            .main-container { flex-direction: column; height: auto; overflow: visible; }
            .work-area { padding: 25px; padding-bottom: 150px; }
            
            @media (max-width: 768px) {
            .right-panel { 
                position: fixed; 
                bottom: 85px; /* Ajustado a la altura del nuevo menú de index */
                left: 0; 
                width: 100%; 
                height: 70vh; 
                border-radius: 30px 30px 0 0; 
                transform: translateY(calc(100% - 60px)); 
                z-index: 7000; 
                transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            }

            .right-panel.open { 
                transform: translateY(0); 
            }

            /* Evita que el contenido del inventario/ventas quede oculto tras la tabbar */
            .work-area { 
                padding-bottom: 150px !important; 
            }
        }
            .handle { 
                width: 50px; 
                height: 6px; 
                background: #444; 
                border-radius: 10px; 
                margin: -10px auto 20px auto; 
                display: block; 
            }
            .right-panel.open { transform: translateY(0); }
            .handle { width: 40px; height: 5px; background: #555; border-radius: 10px; margin: 0 auto 15px auto; display: block; }
            .main-container { flex-direction: column; }
            .work-area { padding-bottom: 150px; }
        }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="app">
    <div class="sidebar">
        <div class="logo-container">
            <div class="logo">TAMAKU</div>
            <div class="sub-logo">Luxury Business Pro</div>
        </div>
        <div class="menu">
            <button onclick="location.href='index.html'"><span>🏠</span> Inicio</button>
            <button class="activo" onclick="location.href='ventas.html'"><span>💰</span> Ventas</button>
            <button onclick="location.href='inventario.html'"><span>📦</span> Inventario</button>
            <button onclick="location.href='cierres.html'"><span>🧾</span> Cierres</button>
            <button onclick="location.href='reportes.html'"><span>📊</span> Reportes</button>
        </div>
    </div>

    <div class="main-container">
        <div class="work-area">
            <div class="card" style="background: #fffdf0; border: 1px solid rgba(212,175,55,0.3);">
                <h3 id="cajaStatus">Cargando...</h3>
                <div style="display: flex; gap: 8px;">
                    <button id="btnAbrir" class="btn-modo rapido-on" onclick="abrirCaja()">Abrir Jornada</button>
                    <button id="btnAudit" class="btn-modo rapido-on" style="background:#000; color:#fff" onclick="mostrarAuditoria()">📋 Auditoría</button>
                    <button id="btnCerrar" class="btn-modo" style="background:#fff; color:var(--rojo); border:1px solid #eee;" onclick="confirmarCierre()">Cerrar</button>
                </div>
            </div>

            <div id="panelVenta" style="display: none;">
                <div class="card">
                    <div class="modo-selector">
                        <button id="modR" class="btn-modo rapido-on" onclick="setModo('rapido')">Venta Rápida</button>
                        <button id="modC" class="btn-modo off" onclick="setModo('cuenta')">Cuenta Abierta</button>
                    </div>
                </div>

                <div class="card" id="cardCuentas" style="display:none;">
                    <h3>Clientes</h3>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="inputCliente" placeholder="Nombre...">
                        <button class="btn-agregar" onclick="crearCuenta()">ABRIR</button>
                    </div>
                    <div id="chipsCuentas" style="margin-top: 15px; display: flex; flex-wrap: wrap; gap: 6px;"></div>
                </div>

                <div class="card">
                    <h3>Productos</h3>
                    <div class="search-grid">
                        <input type="number" id="plu" placeholder="PLU" oninput="buscarPlu()">
                        <input type="text" id="nom" placeholder="Producto..." oninput="buscarNombre()">
                        <input type="number" id="cant" value="1">
                        <button class="btn-agregar" onclick="agregar()">AGREGAR</button>
                    </div>
                    <div class="result-box" id="res"></div>
                </div>
            </div>
        </div>

        <div class="right-panel" id="cartPanel" onclick="toggleCartMobile()">
            <span class="handle"></span>
            <div class="cart-header"><h2>Resumen</h2><span id="reloj"></span></div>
            <div class="cart-list" id="listaCarrito"></div>
            <div class="total-row"><span>Total</span><span id="totalTxt">$ 0</span></div>
            <button class="btn-acc btn-green" onclick="event.stopPropagation(); abrirPago();">✅ REGISTRAR VENTA</button>
            <button class="btn-acc" style="background:#222; color:var(--rojo);" onclick="event.stopPropagation(); confirmarBorrado();">BORRAR</button>
        </div>
    </div>

    <nav class="tabbar">
        <a href="index.html" class="tab-item">
            <span class="icon">🏠</span><span>Inicio</span>
        </a>
        <a href="ventas.html" class="tab-item activo">
            <span class="icon">💰</span><span>Ventas</span>
        </a>
        <a href="inventario.html" class="tab-item">
            <span class="icon">📦</span><span>Stock</span>
        </a>
        <a href="cierres.html" class="tab-item">
            <span class="icon">🧾</span><span>Cierres</span>
        </a>
        <a href="reportes.html" class="tab-item">
            <span class="icon">📊</span><span>Reportes</span>
        </a>
    </nav>
</div>
<div id="modalAuditoria" class="modal-overlay">
    <div class="modal-content" style="max-width: 600px; text-align: left;">
        <h2 style="text-align: center; margin-bottom: 20px;">📋 Auditoría de Jornada</h2>
        <div id="resumenAuditoria" style="max-height: 400px; overflow-y: auto;">
    <p style="text-align:center; color:#999; padding:20px;">Esperando datos de la jornada...</p>
</div>
        <button class="btn-acc" style="background:var(--negro); color:white; width:100%; margin-top:20px;" onclick="document.getElementById('modalAuditoria').style.display='none'">CERRAR</button>
    </div>
</div>

<div id="modalPago" class="modal-overlay">
    <div class="modal-content">
        <h2>Pasarela de Pago</h2>
        <h1 id="montoPago" style="font-size: 45px; margin: 15px 0; color: var(--dorado-medio);">$ 0</h1>
        
        <div class="pay-grid">
            <div class="pay-btn" id="payEfectivo" onclick="seleccionarMetodo('Efectivo')">
                <span>💵</span><b>Efectivo</b>
            </div>
            <div class="pay-btn" id="payNequi" onclick="seleccionarMetodo('Nequi')">
                <span>📱</span><b>Nequi</b>
            </div>
            <div class="pay-btn" id="payDaviplata" onclick="seleccionarMetodo('Daviplata')">
                <span>📲</span><b>Davi</b>
            </div>
        </div>

        <div id="calcBox" style="display: none; background: #f8f8fa; padding: 20px; border-radius: 20px; margin-bottom: 20px;">
            <label class="label-text" style="font-size:10px; color:#999; margin-bottom:5px; display:block;">PAGA CON:</label>
            <input type="number" id="pagaCon" placeholder="0" oninput="calcularVueltas()" style="text-align: center; font-size: 22px; font-weight: 800; border:none; background:transparent;">
            <div style="margin-top:15px; border-top:1px solid #ddd; padding-top:10px;">
                <span style="font-size:12px; color:#666;">CAMBIO:</span>
                <h2 id="vueltasTxt" style="color: var(--verde);">$ 0</h2>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-acc" style="background:#f0f0f0; color:#666;" onclick="document.getElementById('modalPago').style.display='none'">CANCELAR</button>
            <button class="btn-acc btn-green" style="margin:0;" onclick="confirmarVentaFinal()">CONFIRMAR</button>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://xofaoaikrtldkvfifnub.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvZmFvYWlrcnRsZGt2ZmlmbnViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODc4ODYsImV4cCI6MjA5MTA2Mzg4Nn0.8QStNtgFGf6qStCJV9jmI8rxvEbDo-fcdOvhCOX9uNA';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let PRODUCTOS_INVENTARIO = [], todasLasVentasAuditoria = [];
    let paginaActualAuditoria = 1;
    const ventasPorPagina = 10;
    let historial = JSON.parse(localStorage.getItem('tk_hist')) || [];
    let cajaActiva = JSON.parse(localStorage.getItem('tk_caja')) || false, cuentas = JSON.parse(localStorage.getItem('tk_cuentas')) || [];
    let carritoR = JSON.parse(localStorage.getItem('tk_carro_r')) || [], modo = 'rapido', cActiva = null, pSel = null, metTemp = "";

    const fmt = (n) => "$ " + Math.round(n || 0).toLocaleString('es-CO');

    function showToast(msg) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div'); toast.className = 'toast';
        toast.innerHTML = `✨ <span>${msg}</span>`; container.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function toggleCartMobile() { if (window.innerWidth <= 768) document.getElementById('cartPanel').classList.toggle('open'); }

    function sync() {
        localStorage.setItem('tk_hist', JSON.stringify(historial));
        localStorage.setItem('tk_caja', JSON.stringify(cajaActiva));
        localStorage.setItem('tk_cuentas', JSON.stringify(cuentas));
        localStorage.setItem('tk_carro_r', JSON.stringify(carritoR));
    }

    function abrirCaja() { cajaActiva = true; sync(); renderCaja(); showToast("Jornada iniciada"); }
    function confirmarCierre() { if(confirm("¿Cerrar caja?")) { cajaActiva = false; sync(); renderCaja(); showToast("Caja cerrada"); } }
    
    function renderCaja() {
        document.getElementById('panelVenta').style.display = cajaActiva ? "block" : "none";
        document.getElementById('btnAbrir').style.display = cajaActiva ? "none" : "block";
        document.getElementById('cajaStatus').innerText = cajaActiva ? "🟢 Jornada Abierta" : "📦 Caja Cerrada";
    }

    async function cargarProductosDesdeNube() {
        const { data } = await _supabase.from('productos').select('*');
        if (data) PRODUCTOS_INVENTARIO = data.map(p => ({ codigo: p.codigo, nombre: p.nombre, precio: p.precio_venta }));
    }

    function buscarPlu() {
        let p = PRODUCTOS_INVENTARIO.find(x => String(x.codigo) === document.getElementById('plu').value.trim());
        if (p) { pSel = p; document.getElementById('nom').value = p.nombre; }
    }

    function buscarNombre() {
        let val = document.getElementById('nom').value.toLowerCase();
        let res = document.getElementById('res'); 
        res.innerHTML = "";
        if(val.length < 2) return; // Solo busca si hay más de 2 letras para ahorrar procesos
        
        let filtrados = PRODUCTOS_INVENTARIO.filter(x => x.nombre.toLowerCase().includes(val));
        
        filtrados.slice(0, 10).forEach(p => { // Limitamos a 10 resultados para no saturar
            let d = document.createElement('div'); 
            d.className = "item-row";
            d.innerHTML = `<span>${p.nombre}</span> <b>${fmt(p.precio)}</b>`;
            d.onclick = () => { 
                pSel = p; 
                document.getElementById('nom').value = p.nombre; 
                document.getElementById('plu').value = p.codigo; 
                res.innerHTML = ""; 
                document.getElementById('cant').focus(); // Salta automáticamente a cantidad
            };
            res.appendChild(d);
        });
    }

    function agregar() {
        let n = parseInt(document.getElementById('cant').value);
        if(!pSel || n <= 0) return showToast("Seleccione un producto");
        let item = { uid: Date.now(), nombre: pSel.nombre, precio: pSel.precio, cant: n, sub: pSel.precio * n };
        if(modo === 'rapido') carritoR.push(item);
        else { if(!cActiva) return showToast("Elige un cliente"); cActiva.items.push(item); }
        document.getElementById('plu').value = ""; document.getElementById('nom').value = ""; document.getElementById('cant').value = "1";
        pSel = null; sync(); render(); showToast("Producto agregado");
    }

    function render() {
        let list = modo === 'rapido' ? carritoR : (cActiva ? cActiva.items : []);
        let cont = document.getElementById('listaCarrito'); cont.innerHTML = "";
        let t = 0;
        list.forEach(i => {
            t += i.sub;
            cont.innerHTML += `<div class="cart-item">
                <div style="display:flex; justify-content:space-between;"><b>${i.nombre}</b><span>${fmt(i.sub)}</span></div>
                <div style="font-size:10px; color:#666;">${i.cant} x ${fmt(i.precio)}</div>
            </div>`;
        });
        document.getElementById('totalTxt').innerText = fmt(t);
        
        let chipCont = document.getElementById('chipsCuentas'); chipCont.innerHTML = "";
        cuentas.forEach(c => {
            let b = document.createElement('button'); b.className = "btn-modo"; b.style.width="auto";
            if(cActiva && cActiva.id === c.id) b.classList.add('cuenta-on'); else b.classList.add('off');
            b.innerText = c.nombre; b.onclick = () => { cActiva = c; setModo('cuenta'); };
            chipCont.appendChild(b);
        });
    }

    function setModo(m) {
        modo = m;
        document.getElementById('cardCuentas').style.display = m === 'cuenta' ? 'block' : 'none';
        document.getElementById('modR').className = m === 'rapido' ? "btn-modo rapido-on" : "btn-modo off";
        document.getElementById('modC').className = (m === 'cuenta' && cActiva) ? "btn-modo cuenta-on" : "btn-modo off";
        render();
    }

    function crearCuenta() {
        let n = document.getElementById('inputCliente').value.trim();
        if(n) { 
            let c = {id: Date.now(), nombre: n.toUpperCase(), items: []}; 
            cuentas.push(c); cActiva = c; document.getElementById('inputCliente').value = ""; 
            sync(); render(); showToast("Cuenta abierta");
        }
    }

    function abrirPago() {
    let t = parseInt(document.getElementById('totalTxt').innerText.replace(/[^0-9]/g, "")) || 0;
    if(t <= 0) return showToast("No hay productos");
    
    // Esto cierra el panel del carrito en el celular para que no estorbe
    if (window.innerWidth <= 768) document.getElementById('cartPanel').classList.remove('open');

        document.getElementById('montoPago').innerText = fmt(t);
        document.getElementById('modalPago').style.display = "flex";
        document.getElementById('calcBox').style.display = "none";
        metTemp = "";
        document.querySelectorAll('.pay-btn').forEach(x => x.classList.remove('selected'));
    }

    // LÓGICA DE SELECCIÓN DE MÉTODO CORREGIDA
    function seleccionarMetodo(m) {
        metTemp = m;
        document.querySelectorAll('.pay-btn').forEach(x => x.classList.remove('selected'));
        document.getElementById('pay' + m).classList.add('selected');
        document.getElementById('calcBox').style.display = m === 'Efectivo' ? "block" : "none";
        if(m === 'Efectivo') {
            document.getElementById('pagaCon').value = "";
            document.getElementById('vueltasTxt').innerText = "$ 0";
            document.getElementById('pagaCon').focus();
        }
    }

    function calcularVueltas() {
        let t = parseInt(document.getElementById('montoPago').innerText.replace(/[^0-9]/g, ""));
        let p = parseInt(document.getElementById('pagaCon').value) || 0;
        document.getElementById('vueltasTxt').innerText = fmt(p - t > 0 ? p - t : 0);
    }

    async function confirmarVentaFinal() {
    if(!metTemp) return showToast("Seleccione medio de pago");
    
    let list = modo === 'rapido' ? [...carritoR] : [...cActiva.items];
    if(list.length === 0) return showToast("El carrito está vacío");

    let t = list.reduce((a, b) => a + b.sub, 0);
    let cliente = modo === 'rapido' ? 'V.RÁPIDA' : cActiva.nombre;
    let pagCon = parseInt(document.getElementById('pagaCon').value) || 0;
    let vueltas = (pagCon - t > 0) ? (pagCon - t) : 0;

    // BLOQUE 1: Insertar en la tabla 'ventas' (Cabecera)
    const { data: ventaData, error: errorVenta } = await _supabase
        .from('ventas')
        .insert([{
            cliente: cliente,
            metodo_pago: metTemp,
            total_venta: t,
            pago_con: pagCon,
            cambio: vueltas
        }])
        .select();

    if (errorVenta) return showToast("❌ Error factura: " + errorVenta.message);

    // BLOQUE 2: Preparar los productos para 'venta_detalles'
    const idVenta = ventaData[0].id;
    const detalles = list.map(item => ({
        venta_id: idVenta,
        nombre_producto: item.nombre,
        cantidad: item.cant,
        precio_unitario: item.precio,
        subtotal: item.sub
    }));

    // BLOQUE 3: Insertar todos los productos de un solo golpe
    const { error: errorDetalle } = await _supabase
        .from('venta_detalles')
        .insert(detalles);

    if(!errorDetalle) {
        // Limpiar todo si salió bien
        if(modo === 'rapido') carritoR = []; 
        else { cuentas = cuentas.filter(x => x.id !== cActiva.id); cActiva = null; }
        
        document.getElementById('modalPago').style.display = "none";
        if (window.innerWidth <= 768) document.getElementById('cartPanel').classList.remove('open');
        
        sync(); 
        render();
        showToast("✅ Venta registrada con éxito");
    } else {
        showToast("❌ Error productos: " + errorDetalle.message);
    }
}
    function confirmarBorrado() { if(confirm("¿Vaciar carrito?")) { if(modo === 'rapido') carritoR = []; else if(cActiva) cActiva.items = []; sync(); render(); showToast("Vaciado"); } }

    async function mostrarAuditoria() {
    const modal = document.getElementById('modalAuditoria');
    const contenedor = document.getElementById('resumenAuditoria');
    modal.style.display = 'flex';
    contenedor.innerHTML = `<div style="text-align:center; padding:20px;"><p>⌛ Consultando...</p></div>`;

    const hoy = new Date().toISOString().split('T')[0];
    
    // Traemos las ventas Y sus detalles de una sola vez (Join)
    const { data: ventas, error } = await _supabase
        .from('ventas')
        .select('*, venta_detalles(*)')
        .gte('fecha_hora', hoy)
        .order('fecha_hora', { ascending: false });

    if (error) { contenedor.innerHTML = "<p>Error: " + error.message + "</p>"; return; }

    todasLasVentasAuditoria = ventas;
    paginaActualAuditoria = 1;
    
    // Cálculo de totales por método
    let totales = { Efectivo: 0, Nequi: 0, Daviplata: 0 };
    ventas.forEach(v => { 
        if (totales[v.metodo_pago] !== undefined) totales[v.metodo_pago] += v.total_venta; 
    });
    let totalG = totales.Efectivo + totales.Nequi + totales.Daviplata;

    // Renderizado del encabezado de totales
    let headerHTML = `
        <div style="background: #f0f9ff; padding: 15px; border-radius: 15px; margin-bottom: 15px;">
            <p><b>Total General Hoy:</b> <span style="float:right">${fmt(totalG)}</span></p>
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
            <div style="background:#fff; border:1px solid #eee; padding:10px; border-radius:10px; text-align:center;">💵<br><small>Efectivo</small><br><b>${fmt(totales.Efectivo)}</b></div>
            <div style="background:#fff; border:1px solid #eee; padding:10px; border-radius:10px; text-align:center;">📱<br><small>Nequi</small><br><b>${fmt(totales.Nequi)}</b></div>
            <div style="background:#fff; border:1px solid #eee; padding:10px; border-radius:10px; text-align:center;">📲<br><small>Davi</small><br><b>${fmt(totales.Daviplata)}</b></div>
        </div>
        <h3>Últimas Ventas</h3>
        <div id="tablaPaginada"></div>
    `;
    
    contenedor.innerHTML = headerHTML;
    renderizarTablaPaginada();
}

function renderizarTablaPaginada() {
    const contenedorTabla = document.getElementById('tablaPaginada');
    const inicio = (paginaActualAuditoria - 1) * ventasPorPagina;
    const fin = inicio + ventasPorPagina;
    const ventasVisibles = todasLasVentasAuditoria.slice(inicio, fin);

    let html = `
        <table style="width:100%; font-size: 11px; border-collapse: collapse; margin-top:10px;">
            <tr style="color: #999; text-align: left; border-bottom: 1px solid #eee;">
                <th style="padding: 5px 0;">Venta</th>
                <th>Productos</th>
                <th style="text-align:right;">Total</th>
            </tr>`;

    ventasVisibles.forEach(v => {
        let productosHTML = v.venta_detalles.map(d => 
            `<div style="color:#666;">• ${d.cantidad}x ${d.nombre_producto}</div>`
        ).join('');

        html += `
            <tr style="border-bottom:1px solid #eee;">
                <td style="padding:10px 0; vertical-align:top;">
                    <b>${v.cliente}</b><br>
                    <small>${new Date(v.fecha_hora).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small>
                </td>
                <td style="padding:10px 0;">${productosHTML}</td>
                <td style="text-align:right; font-weight:bold; vertical-align:top;">${fmt(v.total_venta)}</td>
            </tr>`;
    });

    html += `</table>`;
    
    // Controles de paginación si hay más de una página
    if (todasLasVentasAuditoria.length > ventasPorPagina) {
        html += `
            <div style="display:flex; justify-content:center; gap:20px; margin-top:15px;">
                <button onclick="cambiarPaginaAuditoria(-1)" ${paginaActualAuditoria === 1 ? 'disabled' : ''} style="padding:5px 10px; border-radius:8px; border:1px solid #ddd; background:white;">Anterior</button>
                <span>${paginaActualAuditoria}</span>
                <button onclick="cambiarPaginaAuditoria(1)" ${fin >= todasLasVentasAuditoria.length ? 'disabled' : ''} style="padding:5px 10px; border-radius:8px; border:1px solid #ddd; background:white;">Siguiente</button>
            </div>`;
    }

    contenedorTabla.innerHTML = html;
}

function cambiarPaginaAuditoria(dir) {
    paginaActualAuditoria += dir;
    renderizarTablaPaginada();
}

cargarProductosDesdeNube();
