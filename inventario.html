<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAMAKU - Inventario Cloud Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --blanco: #f5f5f5;
            --negro: #111111;
            --dorado: #d4af37;
            --gris-claro: #eaeaea;
            --verde: #27ae60;
            --rojo: #e74c3c;
            --azul: #3498db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f5f5f5, #eaeaea);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .app {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 240px;
            background: #fff;
            border-right: 1px solid #ddd;
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .logo { font-size: 22px; font-weight: 700; color: var(--dorado); }
        .sub { font-size: 11px; color: #777; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px;}

        .menu { flex: 1; }
        .menu button {
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border: none;
            border-radius: 12px;
            background: var(--gris-claro);
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #555;
        }

        .menu button.activo {
            background: var(--dorado);
            color: #fff;
        }

        /* --- CONTENIDO --- */
        .content {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: #fdfdfd;
        }

        h2 { font-weight: 700; color: #333; margin-bottom: 20px; font-size: 24px; }

        /* --- CARD REGISTRO --- */
        .card {
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .grid-form {
            display: grid;
            grid-template-columns: 100px 1fr 100px 130px 100px;
            gap: 15px;
            align-items: flex-end;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .label-text { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; }

        input {
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #eee;
            outline: none;
            font-size: 14px;
            background: #fafafa;
            width: 100%;
            transition: 0.3s;
        }
        input:focus { border-color: var(--dorado); background: #fff; }

        /* --- BOTÓN GUARDAR CORREGIDO --- */
        .btn-save {
            background: var(--dorado);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            font-size: 14px;
            display: block;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }
        .btn-save:active { transform: scale(0.96); }
        .btn-save:hover { background: #b8962d; }

        /* --- TABLA --- */
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid #eee;
            color: #aaa;
            text-transform: uppercase;
            font-size: 10px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f1f1f1;
            font-size: 13px;
        }

        .ganancia-txt { color: var(--verde); font-weight: 700; }

        /* --- RESPONSIVE IPHONE --- */
        @media (max-width: 768px) {
            .app { flex-direction: column; height: auto; overflow: auto; }
            .sidebar {
                width: 100%; height: auto; padding: 10px;
                flex-direction: row; justify-content: space-around;
                position: sticky; top: 0; z-index: 1500; border-right: none; border-bottom: 1px solid #ddd;
            }
            .sidebar .logo, .sidebar .sub { display: none; }
            .menu { display: flex; gap: 5px; width: 100%; overflow-x: auto; padding-bottom: 5px; }
            .menu button { margin-bottom: 0; font-size: 11px; padding: 12px 15px; white-space: nowrap; width: auto; }

            .content { padding: 15px; height: auto; overflow: visible; }
            .grid-form { 
                grid-template-columns: 1fr 1fr; 
                gap: 12px; 
            }
            .grid-form .input-group:nth-child(2) { grid-column: span 2; }
            .btn-save { 
                grid-column: span 2; 
                padding: 16px; 
                font-size: 16px; 
                margin-top: 10px; 
            }
        }
        .toast {
            min-width: 250px;
            padding: 15px 18px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: slideIn 0.4s ease;
        }

        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }
        .toast.warn { background: #f39c12; }

        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        /* --- MODAL PRO --- */
        .modal-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9998;
            animation: fadeIn 0.3s ease;
        }

        .modal {
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: scaleIn 0.3s ease;
        }

        .modal h3 {
            margin-bottom: 10px;
        }

        .modal p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            background: #eee;
        }

        .btn-confirm {
            background: var(--rojo);
            color: white;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes scaleIn {
            from {transform: scale(0.8); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }
    </style>
</head>
<body>

<div class="app">
    <div class="sidebar">
        <div>
            <div class="logo">TAMAKU</div>
            <div class="sub">Miscelánea & Cloud</div>
        </div>

        <div class="menu">
            <button onclick="location.href='index.html'">🏠 Inicio</button>
            <button onclick="location.href='ventas.html'">💰 Ventas</button>
            <button class="activo">📦 Inventario</button>
            <button onclick="alert('Próximamente')">➕ Agregar</button>
            <button onclick="alert('Próximamente')">📊 Reportes</button>
        </div>
    </div>

    <div class="content">
        <h2>Inventario Cloud Profesional</h2>

        <div class="card">
            <h3 style="margin-bottom: 20px; font-size: 16px; color: #555;">📥 Registro de Productos</h3>
            <h3 id="modoEdicionTxt" style="margin-bottom:10px; color:#999;">
                Modo: Nuevo Producto
            </h3>
            <div class="grid-form">
                <div class="input-group">
                    <span class="label-text">PLU (Cód)</span>
                    <input type="number" id="cod" placeholder="1">
                </div>
                <div class="input-group">
                    <span class="label-text">Nombre del Producto</span>
                    <input type="text" id="nom" placeholder="Ej: Poker en lata">
                </div>
                <div class="input-group">
                    <span class="label-text">Existencia</span>
                    <input type="number" id="stock" placeholder="0">
                </div>
                <div class="input-group">
                    <span class="label-text">Costo Mayor</span>
                    <input type="number" id="costo" placeholder="$" oninput="calcularPreview()">
                </div>
                <div class="input-group">
                    <span class="label-text">% Ganancia</span>
                    <input type="number" id="porcentaje" placeholder="%" oninput="calcularPreview()">
                </div>
                <div class="input-group" style="grid-column: span 2;">
                <span class="label-text">Vista previa</span>
                <div id="previewGanancia" style="padding:12px; border-radius:12px; background:#f4f4f4; font-weight:600;">
                    Utilidad: $ 0 | Venta: $ 0
                </div>
            </div>
                <div class="input-group" style="grid-column: span 2; width: 100%;">
                    <button class="btn-save" onclick="guardarEnSupabase()">GUARDAR PRODUCTO</button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Cód</th>
                        <th>Producto</th>
                        <th>Stock</th>
                        <th>Costo Mayor</th>
                        <th>Venta Sugerida</th>
                        <th>Utilidad Unit.</th>
                        <th>Utilidad Total</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="listaProductosBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN DE CONEXIÓN REAL ---
    const supabaseUrl = 'https://xofaoaikrtldkvfifnub.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvZmFvYWlrcnRsZGt2ZmlmbnViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODc4ODYsImV4cCI6MjA5MTA2Mzg4Nn0.8QStNtgFGf6qStCJV9jmI8rxvEbDo-fcdOvhCOX9uNA';
    
    // Inicialización del cliente
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const fmt = (n) => "$ " + Math.round(n || 0).toLocaleString('es-CO');
    function mostrarToast(msg, tipo = "success") {
    const box = document.getElementById('toastBox');

    const toast = document.createElement('div');
    toast.className = "toast " + tipo;
    toast.innerText = msg;

    box.appendChild(toast);

    setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transform = "translateX(120%)";
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
function mostrarModal(titulo, mensaje, onConfirm) {
    const container = document.getElementById('modalContainer');

    container.innerHTML = `
        <div class="modal-bg">
            <div class="modal">
                <h3>${titulo}</h3>
                <p>${mensaje}</p>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
                    <button class="btn-confirm" onclick="confirmarModal()">Confirmar</button>
                </div>
            </div>
        </div>
    `;

    window._modalConfirm = onConfirm;
}

    function cerrarModal() {
        document.getElementById('modalContainer').innerHTML = "";
    }

    function confirmarModal() {
        if (window._modalConfirm) window._modalConfirm();
        cerrarModal();
    }
    function generarSiguienteCodigo(lista) {
    if (!lista || lista.length === 0) return 1;

    const codigos = lista.map(p => p.codigo);
    const max = Math.max(...codigos);

    return max + 1;
}

    // --- CARGAR PRODUCTOS ---
    async function cargarDesdeNube() {
        try {
            const { data, error } = await _supabase
                .from('productos')
                .select('*')
                .order('codigo', { ascending: true });

            if (error) throw error;
            renderTabla(data);
            // Generar siguiente código automático
            const siguiente = generarSiguienteCodigo(data);
            if (!document.getElementById('cod').value) {
                if (!document.getElementById('cod').value) {
            document.getElementById('cod').value = siguiente;
        }
            }
        } catch (err) {
            console.error("Error al conectar:", err);
            // Aviso más amigable
            console.log("No se pudo conectar a Supabase. Verifica tu conexión o políticas RLS.");
        }
    }

    // --- GUARDAR O ACTUALIZAR ---
    async function guardarEnSupabase() {
        const cod = parseInt(document.getElementById('cod').value);
        const nom = document.getElementById('nom').value.trim().toUpperCase();
        const stk = parseInt(document.getElementById('stock').value) || 0;
        const cst = parseInt(document.getElementById('costo').value) || 0;
        const por = parseInt(document.getElementById('porcentaje').value) || 0;

        if (!cod || !nom) {
            mostrarToast("⚠️ Ingresa código y nombre", "warn");
            return;
        }
        // Validar si el código ya existe
        const { data: existente } = await _supabase
            .from('productos')
            .select('*')
            .eq('codigo', cod)
            .maybeSingle();

        if (existente) {
            const confirmar = confirm("⚠️ Este código ya existe. ¿Deseas actualizarlo?");
            if (!confirmar) return;
        }
        const utilidadUnitaria = cst * (por / 100);
        const pVenta = cst + utilidadUnitaria;
        const gTotal = utilidadUnitaria * stk;

        try {
            const { error } = await _supabase
                .from('productos')
                .upsert({ 
                    codigo: cod, 
                    nombre: nom, 
                    stock: stk, 
                    costo_mayor: cst, 
                    porcentaje_ganancia: por,
                    precio_venta: pVenta,
                    ganancia_proyectada: gTotal
                }, { onConflict: 'codigo' });

            if (error) throw error;

            mostrarToast("✅ Producto guardado correctamente", "success");
            limpiarCampos();
            cargarDesdeNube();
        } catch (err) {
            mostrarToast("❌ Error: " + err.message, "error");
        }
    }

    // --- ELIMINAR ---
    async function borrarProducto(codigo) {
    mostrarModal(
        "Eliminar producto",
        "¿Seguro que deseas eliminar este producto?",
        async () => {
            try {
                const { error } = await _supabase
                    .from('productos')
                    .delete()
                    .eq('codigo', codigo);

                if (error) throw error;

                mostrarToast("🗑️ Producto eliminado", "success");
                cargarDesdeNube();
            } catch (err) {
                mostrarToast("❌ Error al eliminar", "error");
            }
        }
    );
}

    // --- RENDERIZAR TABLA ---
    function renderTabla(lista) {
        const cont = document.getElementById('listaProductosBody');
        cont.innerHTML = "";
        
        lista.forEach(p => {
            const utilUnit = p.precio_venta - p.costo_mayor;
            cont.innerHTML += `
                <tr>
                    <td><b style="background:#eee; padding:5px 10px; border-radius:5px;">${p.codigo}</b></td>
                    <td><b>${p.nombre}</b></td>
                    <td>${p.stock} un.</td>
                    <td>${fmt(p.costo_mayor)}</td>
                    <td style="color:var(--azul); font-weight:700;">${fmt(p.precio_venta)}</td>
                    <td style="color:var(--verde)">+ ${fmt(utilUnit)}</td>
                    <td class="ganancia-txt">${fmt(p.ganancia_proyectada)}</td>
                    <td>
                    <button onclick="editarProducto(${p.codigo})"
                        style="margin-right:5px; background:none; border:none; color:var(--azul); cursor:pointer; font-weight:bold;">
                        ✏️
                    </button>

                    <button onclick="borrarProducto(${p.codigo})"
                        style="background:none; border:none; color:var(--rojo); cursor:pointer; font-weight:bold; font-size:18px;">
                        ✕
                    </button>
                </td>
                </tr>
            `;
        });
    }

    function limpiarCampos() {
    document.getElementById('nom').value = "";
    document.getElementById('stock').value = "";
    document.getElementById('costo').value = "";
    document.getElementById('porcentaje').value = "";

    document.getElementById('modoEdicionTxt').innerText = "Modo: Nuevo Producto";
    document.getElementById('previewGanancia').innerText = "Utilidad: $ 0 | Venta: $ 0";
    // volver a generar código automático
    cargarDesdeNube();
}
    function editarProducto(codigo) {
    _supabase
        .from('productos')
        .select('*')
        .eq('codigo', codigo)
        .single()
        .then(({ data, error }) => {
            if (error) {
                mostrarToast("❌ Error al cargar producto", "error");
                return;
            }

            document.getElementById('modoEdicionTxt').innerText = "✏️ Editando producto";

            document.getElementById('cod').value = data.codigo;
            document.getElementById('cod').disabled = true;
            document.getElementById('nom').value = data.nombre;
            document.getElementById('stock').value = data.stock;
            document.getElementById('costo').value = data.costo_mayor;
            document.getElementById('porcentaje').value = data.porcentaje_ganancia;
            calcularPreview();

            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
}
function calcularPreview() {
    const costo = parseFloat(document.getElementById('costo').value) || 0;
    const porcentaje = parseFloat(document.getElementById('porcentaje').value) || 0;

    const utilidad = costo * (porcentaje / 100);
    const venta = costo + utilidad;

    let estado = "";
    let color = "";

    if (porcentaje < 20) {
        estado = "⚠️ Ganancia baja";
        color = "#e74c3c";
    } else if (porcentaje >= 20 && porcentaje < 40) {
        estado = "🟡 Ganancia media";
        color = "#f1c40f";
    } else {
        estado = "🟢 Buena ganancia";
        color = "#27ae60";
    }

    // sugerencia automática
    const sugerido = costo * 1.3; // 30% recomendado

    const box = document.getElementById('previewGanancia');
    box.style.color = color;

    box.innerHTML = `
        Utilidad: <b>${fmt(utilidad)}</b><br>
        Venta: <b>${fmt(venta)}</b><br>
        <small>${estado}</small><br>
        <small>💡 Sugerido (30%): ${fmt(sugerido)}</small>
    `;
}
    window.onload = cargarDesdeNube;
</script>
<div id="toastBox" style="
position: fixed;
top: 20px;
right: 20px;
z-index: 9999;
display: flex;
flex-direction: column;
gap: 10px;
"></div>

<div id="modalContainer"></div>
</body>
</html>
